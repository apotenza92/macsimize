name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  build-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - channel: stable
            product_name: Macsimize
            bundle_id: pzc.Macsimize
            app_icon: AppIcon
          - channel: beta
            product_name: Macsimize Beta
            bundle_id: pzc.Macsimize.beta
            app_icon: AppIconBeta
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Macsimize (${{ matrix.channel }})
        run: |
          set -euo pipefail
          xcodebuild \
            -project Macsimize.xcodeproj \
            -scheme Macsimize \
            -configuration Release \
            -destination "generic/platform=macOS" \
            -derivedDataPath build/DerivedData \
            PRODUCT_NAME="${{ matrix.product_name }}" \
            PRODUCT_BUNDLE_IDENTIFIER="${{ matrix.bundle_id }}" \
            ASSETCATALOG_COMPILER_APPICON_NAME="${{ matrix.app_icon }}" \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Validate Sparkle bundle layout (${{ matrix.channel }})
        run: |
          set -euo pipefail
          APP_PATH="build/DerivedData/Build/Products/Release/${{ matrix.product_name }}.app"
          python3 scripts/release/validate_sparkle_bundle.py --app-path "$APP_PATH"
